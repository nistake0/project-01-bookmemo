<svg width="192" height="192" viewBox="0 0 192 192" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景: 温かみのあるグラデーション（茶系・図書館感） -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B4423"/>
      <stop offset="100%" stop-color="#8B5E3C"/>
    </linearGradient>
    <linearGradient id="bookLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5E6D3"/>
      <stop offset="50%" stop-color="#FFFBF5"/>
      <stop offset="100%" stop-color="#F5E6D3"/>
    </linearGradient>
    <linearGradient id="memo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8D5B7"/>
      <stop offset="100%" stop-color="#D4B896"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- 角丸背景 -->
  <rect width="192" height="192" rx="36" fill="url(#bg)"/>
  
  <!-- 開いた本 -->
  <g filter="url(#shadow)">
    <path d="M 52 68 Q 96 58 140 68 L 140 124 Q 96 134 52 124 Z" fill="url(#bookLight)" stroke="#8B6F47" stroke-width="1.5" stroke-linejoin="round"/>
    <path d="M 96 62 L 96 130" stroke="#8B6F47" stroke-width="2" stroke-linecap="round"/>
  </g>
  
  <!-- 付箋（折り目付き） -->
  <g transform="translate(112, 76)">
    <path d="M 0 0 L 34 0 L 34 38 L 0 38 Z" fill="url(#memo)" stroke="#A68968" stroke-width="1"/>
    <path d="M 0 0 L 9 0 L 0 9 Z" fill="#C4A574" stroke="#A68968" stroke-width="0.5"/>
  </g>
</svg>
