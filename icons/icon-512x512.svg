<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景: 温かみのあるグラデーション（茶系・図書館感） -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6B4423"/>
      <stop offset="100%" stop-color="#8B5E3C"/>
    </linearGradient>
    <linearGradient id="bookLight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#F5E6D3"/>
      <stop offset="50%" stop-color="#FFFBF5"/>
      <stop offset="100%" stop-color="#F5E6D3"/>
    </linearGradient>
    <linearGradient id="memo" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8D5B7"/>
      <stop offset="100%" stop-color="#D4B896"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- 角丸背景 -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  
  <!-- 開いた本（左右対称の1枚の開いた形） -->
  <g filter="url(#shadow)">
    <path d="M 136 176 Q 256 152 376 176 L 376 336 Q 256 360 136 336 Z" fill="url(#bookLight)" stroke="#8B6F47" stroke-width="2" stroke-linejoin="round"/>
    <!-- 中央の綴じ線 -->
    <path d="M 256 164 L 256 348" stroke="#8B6F47" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- 付箋（折り目付き・控えめなアクセント） -->
  <g transform="translate(300, 200)">
    <path d="M 0 0 L 90 0 L 90 100 L 0 100 Z" fill="url(#memo)" stroke="#A68968" stroke-width="1.5"/>
    <path d="M 0 0 L 24 0 L 0 24 Z" fill="#C4A574" stroke="#A68968" stroke-width="1"/>
  </g>
</svg>
